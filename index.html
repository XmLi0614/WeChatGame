    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
        }

        body {
            background: linear-gradient(180deg, #FFEFF1, #E8F4FF);
            min-height: 100vh;
            padding: 12px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
            border: 3px solid #FFD6E0;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .title {
            font-size: 26px;
            color: #FF6B8B;
            font-weight: bold;
            text-shadow: 2px 2px 0px #FFE0E6;
            margin-bottom: 8px;
        }

        .sub-title {
            font-size: 14px;
            color: #888;
        }

        .score-box {
            background: linear-gradient(90deg, #FFD6E0, #E0F0FF);
            padding: 12px;
            border-radius: 16px;
            text-align: center;
            margin-bottom: 20px;
            font-size: 18px;
            color: #FF5470;
            font-weight: bold;
        }

        .game-card {
            background: #FAFCFF;
            border-radius: 20px;
            padding: 25px 20px;
            min-height: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 18px;
            border: 2px dashed #C0E2FF;
        }

        .question {
            font-size: 28px;
            font-weight: bold;
            color: #4A90E2;
            text-align: center;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn {
            width: 100%;
            padding: 16px;
            font-size: 18px;
            border: none;
            border-radius: 16px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 0px rgba(0, 0, 0, 0.1);
        }

        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0px rgba(0, 0, 0, 0.1);
        }

        .btn-book1 { background: #FF9AAA; }
        .btn-book2 { background: #72CCFF; }
        .btn-mode1 { background: #FF9AAA; }
        .btn-mode2 { background: #72CCFF; }
        .btn-mode3 { background: #62D99B; }
        .btn-answer { background: #4A90E2; }
        .btn-speak { background: #FF9500; margin-top: 10px; padding: 10px; }

        .tip {
            text-align: center;
            margin-top: 15px;
            font-size: 12px;
            color: #bbb;
        }

        .hide {
            display: none !important;
        }

        .correct { background: #4CD964 !important; }
        .wrong { background: #FF3B30 !important; }
    </style>
</head>

        }

        // 打乱
        function shuffle(arr) {
            return arr.sort(() => Math.random() - 0.5);
        }

        // 发音
        function speakNow() {
            if(nowWord){
                let u = new SpeechSynthesisUtterance();
                u.text = nowWord.en;
                u.lang = "en-US";
                u.rate = 0.9;
                speechSynthesis.speak(u);
            }

        }

            nowWord = list[r(0, list.length - 1)];
            options = [nowWord];
            while (options.length < 4) {
                let w = list[r(0, list.length - 1)];
                if (!options.includes(w)) options.push(w);
            }
            options = shuffle(options);
            showQuestion();
        }

            const q = document.getElementById("questionText");
            btnAns.forEach(b => b.classList.remove("correct", "wrong"));

            if (currentMode === 1) {
                q.innerHTML = `🔊 请听：${nowWord.en}`;
                btnAns.forEach((b, i) => b.innerHTML = options[i].cn);
            } else if (currentMode === 2) {
                q.innerHTML = `${nowWord.icon} 对应的单词是？`;
                btnAns.forEach((b, i) => b.innerHTML = options[i].en);
            } else {
                q.innerHTML = `中文：${nowWord.cn}`;
                btnAns.forEach((b, i) => b.innerHTML = options[i].en);
            }
        }

        // 答题
        function ans(idx) {
            const btn = btnAns[idx - 1];
            let ok = false;

            if (currentMode === 1) {
                ok = options[idx - 1].cn === nowWord.cn;
            } else {
                ok = options[idx - 1].en === nowWord.en;
            }

            if (ok) {
                btn.classList.add("correct");
                score += 10;
                document.getElementById("score").innerText = score;
                setTimeout(() => nextQuestion(), 400);
            } else {
                btn.classList.add("wrong");
                setTimeout(() => btn.classList.remove("wrong"), 300);
            }
        }

        // 返回
        function backToMode() {
            document.getElementById("gamePage").classList.add("hide");
            document.getElementById("modePage").classList.remove("hide");
        }

        function backToBook() {
            document.getElementById("modePage").classList.add("hide");
            document.getElementById("bookPage").classList.remove("hide");
            score = 0;
            document.getElementById("score").innerText = 0;
        }
    </script>
</body>
</html>
